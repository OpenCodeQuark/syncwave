services:
  # Optional local Redis for development/testing.
  # Start with: docker compose --profile redis up
  redis:
    profiles: ['redis']
    image: redis:7-alpine
    container_name: syncwave-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  signaling-server:
    build:
      context: ./server
    container_name: syncwave-signaling
    env_file:
      - ./server/.env.example
    environment:
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - '8000:8000'
    restart: unless-stopped

volumes:
  redis-data:
